<title>Budget T7/2026 — Phân bổ ngân sách theo salon</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f3fa;
  --surface: #ffffff;
  --surface-alt: #f7f9fe;
  --border: #e0e5f0;
  --accent: #2f5fe8;
  --accent-light: #ebeffd;
  --text: #131825;
  --text-2: #4e5a78;
  --text-3: #8f9ab8;
  --fb: #1877f2;
  --tk: #ff2d55;
  --gg: #1ea04e;
  --crm: #d97706;
  --weekend-bg: #fff8f0;
  --weekend-border: #fde8c8;
  --shadow-sm: 0 1px 3px rgba(0,0,40,0.07), 0 1px 2px rgba(0,0,40,0.04);
  --shadow: 0 4px 12px rgba(0,0,40,0.08), 0 1px 3px rgba(0,0,40,0.05);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.5;
}

/* ── Header ── */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.page-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.page-sub {
  font-size: 12px;
  color: var(--text-3);
  margin-left: auto;
}

.kpi-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.kpi-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 8px;
  font-size: 12px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
}
.kpi-pill .label { color: var(--text-3); }
.kpi-pill .val { font-weight: 600; color: var(--text); }

.channel-legend {
  display: flex;
  gap: 10px;
  margin-left: auto;
}
.ch-dot {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11.5px;
  color: var(--text-2);
}
.ch-dot::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 2px;
}
.ch-dot.fb::before { background: var(--fb); }
.ch-dot.tk::before { background: var(--tk); }
.ch-dot.gg::before { background: var(--gg); }
.ch-dot.crm::before { background: var(--crm); }

/* ── Controls ── */
.controls {
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 97px;
  z-index: 90;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 13px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 6px 10px 6px 28px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
#searchInput:focus { border-color: var(--accent); }

.filter-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  max-width: 220px;
}
.filter-select:focus { border-color: var(--accent); }

.sort-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 12.5px;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .15s, background .15s;
}
.sort-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-3);
}

/* ── Table ── */
.table-wrap {
  padding: 16px 24px;
}

.salon-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 4px;
}

/* Column widths */
.salon-table th, .salon-table td { padding: 0; }

.th-row th {
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-3);
  background: transparent;
  text-align: left;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.th-row th.r { text-align: right; }
.th-row th:hover { color: var(--text-2); }
.th-row th .sort-arrow { margin-left: 3px; opacity: 0.4; }
.th-row th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

/* Salon row */
.salon-row td {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 10px 10px;
  vertical-align: middle;
  transition: background .12s;
  font-variant-numeric: tabular-nums;
}
.salon-row td:first-child {
  border-left: 1px solid var(--border);
  border-radius: 8px 0 0 8px;
  padding-left: 14px;
}
.salon-row td:last-child {
  border-right: 1px solid var(--border);
  border-radius: 0 8px 8px 0;
  padding-right: 14px;
}
.salon-row:hover td { background: var(--accent-light); border-color: #c5d2f8; }
.salon-row.open td { background: #eef2fd; border-color: #c5d2f8; }
.salon-row { cursor: pointer; }

.salon-name { font-weight: 600; font-size: 13.5px; }
.gdkv-label {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
}
.kh-num { font-size: 15px; font-weight: 700; color: var(--text); }
.budget-total { font-weight: 600; font-size: 13.5px; color: var(--accent); }

.ch-amount {
  font-size: 12.5px;
  font-weight: 500;
}
.ch-amount.fb { color: var(--fb); }
.ch-amount.tk { color: var(--tk); }
.ch-amount.gg { color: var(--gg); }
.ch-amount.crm { color: var(--crm); }

/* Mini stacked bar */
.bar-wrap {
  display: flex;
  height: 5px;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
  min-width: 60px;
}
.bar-seg { height: 100%; }

.expand-icon { color: var(--text-3); font-size: 10px; transition: transform .2s; }
.salon-row.open .expand-icon { transform: rotate(90deg); color: var(--accent); }

/* Detail row */
.detail-row td {
  padding: 0;
  background: var(--surface-alt);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: 0 0 8px 8px;
}
.detail-row { display: none; }
.detail-row.open { display: table-row; }

.daily-scroll {
  overflow-x: auto;
  padding: 12px 14px 14px;
}

.daily-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  min-width: 660px;
}
.daily-table th {
  padding: 4px 8px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-3);
  text-align: right;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.daily-table th:first-child, .daily-table th:nth-child(2) { text-align: left; }
.daily-table td {
  padding: 5px 8px;
  text-align: right;
  color: var(--text-2);
  border-bottom: 1px solid #f0f3fa;
}
.daily-table td:first-child { text-align: left; font-weight: 600; color: var(--text); }
.daily-table td:nth-child(2) { text-align: left; }
.daily-table tr:last-child td { border-bottom: none; }
.daily-table .weekend td { background: var(--weekend-bg); }
.daily-table .weekend td:first-child { border-left: 2px solid var(--crm); padding-left: 6px; }
.daily-table .thu-badge {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
  background: var(--surface-alt);
  color: var(--text-3);
}
.weekend .thu-badge { background: var(--weekend-border); color: #b45309; }
.daily-table td.fb-cell { color: var(--fb); }
.daily-table td.tk-cell { color: var(--tk); }
.daily-table td.gg-cell { color: var(--gg); }
.daily-table td.crm-cell { color: var(--crm); }
.daily-table tfoot td {
  font-weight: 700;
  color: var(--text);
  border-top: 1.5px solid var(--border);
  border-bottom: none;
  background: var(--surface);
  font-size: 12.5px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-3);
  font-size: 14px;
}

@media (max-width: 700px) {
  .site-header, .controls, .table-wrap { padding-left: 12px; padding-right: 12px; }
  .page-sub, .channel-legend { display: none; }
}
</style>

const SALONS = RAW.salons;
let sortKey = 'kh';
let sortDir = -1;
let filterGdkv = '';
let filterName = '';
let openRows = new Set();

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return n.toLocaleString('vi-VN');
}
function fmtFull(n) { return n.toLocaleString('vi-VN'); }

// Populate GDKV filter
const gdkvSet = [...new Set(SALONS.map(s => s.g))].sort();
const sel = document.getElementById('gdkvFilter');
gdkvSet.forEach(g => {
  const o = document.createElement('option');
  o.value = g; o.textContent = g.replace(' GDKV','');
  sel.appendChild(o);
});
sel.addEventListener('change', e => { filterGdkv = e.target.value; render(); });
document.getElementById('searchInput').addEventListener('input', e => { filterName = e.target.value.toLowerCase(); render(); });

function setSort(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = key === 'name' ? 1 : -1; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort' + key.charAt(0).toUpperCase() + key.slice(1)).classList.add('active');
  render();
}

function getFiltered() {
  return SALONS.filter(s => {
    if (filterGdkv && s.g !== filterGdkv) return false;
    if (filterName && !s.n.toLowerCase().includes(filterName)) return false;
    return true;
  }).sort((a, b) => {
    const av = sortKey === 'name' ? a.n : (sortKey === 'kh' ? a.kh : a.b);
    const bv = sortKey === 'name' ? b.n : (sortKey === 'kh' ? b.kh : b.b);
    if (typeof av === 'string') return av.localeCompare(bv, 'vi') * sortDir;
    return (av - bv) * sortDir;
  });
}

function buildDailyTable(s) {
  const rows = s.d.map(([date, thu, kh, budget, fb, tk, gg, crm, wknd]) => {
    const cls = wknd ? ' class="weekend"' : '';
    return `<tr${cls}>
      <td>${date}</td>
      <td><span class="thu-badge">${thu}</span></td>
      <td>${kh}</td>
      <td>${fmtFull(budget)}</td>
      <td class="fb-cell">${fmtFull(fb)}</td>
      <td class="tk-cell">${fmtFull(tk)}</td>
      <td class="gg-cell">${fmtFull(gg)}</td>
      <td class="crm-cell">${fmtFull(crm)}</td>
    </tr>`;
  }).join('');
  return `<div class="daily-scroll">
    <table class="daily-table">
      <thead><tr>
        <th>Ngày</th><th>Thứ</th>
        <th>KH12</th><th>Budget/ngày</th>
        <th>Facebook</th><th>TikTok</th><th>Google</th><th>CRM</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="2">TỔNG THÁNG</td>
        <td>${s.kh}</td>
        <td>${fmtFull(s.b)}</td>
        <td class="fb-cell">${fmtFull(s.fb)}</td>
        <td class="tk-cell">${fmtFull(s.tk)}</td>
        <td class="gg-cell">${fmtFull(s.gg)}</td>
        <td class="crm-cell">${fmtFull(s.crm)}</td>
      </tr></tfoot>
    </table>
  </div>`;
}

function render() {
  const filtered = getFiltered();
  document.getElementById('resultCount').textContent = `${filtered.length} / ${SALONS.length} salon`;
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  filtered.forEach(s => {
    const isOpen = openRows.has(s.id);
    // Salon row
    const tr = document.createElement('tr');
    tr.className = 'salon-row' + (isOpen ? ' open' : '');
    tr.innerHTML = `
      <td><span class="expand-icon">▶</span></td>
      <td>
        <div class="salon-name">${s.n}</div>
        <div class="gdkv-label">${s.g.replace(' GDKV','')}</div>
      </td>
      <td style="text-align:right"><span class="kh-num">${s.kh.toLocaleString('vi-VN')}</span></td>
      <td>
        <div class="budget-total">${fmt(s.b)} đ</div>
        <div class="bar-wrap">
          <div class="bar-seg" style="background:var(--fb);width:68%"></div>
          <div class="bar-seg" style="background:var(--tk);width:18%"></div>
          <div class="bar-seg" style="background:var(--gg);width:7%"></div>
          <div class="bar-seg" style="background:var(--crm);width:7%"></div>
        </div>
      </td>
      <td style="text-align:right"><span class="ch-amount fb">${fmt(s.fb)}</span></td>
      <td style="text-align:right"><span class="ch-amount tk">${fmt(s.tk)}</span></td>
      <td style="text-align:right"><span class="ch-amount gg">${fmt(s.gg)}</span></td>
      <td style="text-align:right"><span class="ch-amount crm">${fmt(s.crm)}</span></td>
    `;
    tr.addEventListener('click', () => {
      const wasOpen = openRows.has(s.id);
      if (wasOpen) openRows.delete(s.id); else openRows.add(s.id);
      render();
    });
    tbody.appendChild(tr);

    // Detail row
    const dr = document.createElement('tr');
    dr.className = 'detail-row' + (isOpen ? ' open' : '');
    dr.innerHTML = `<td colspan="8">${isOpen ? buildDailyTable(s) : ''}</td>`;
    tbody.appendChild(dr);
  });
}

render();
</script>
